name: PR Version & Changelog Update

on:
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  bump-version-and-update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Bump version and update changelog if unchanged
        run: |
          # Fetch the base branch to compare against
          git fetch origin ${{ github.base_ref }}

          # Check if VERSION file has changed compared to the base branch
          if ! git diff --name-only origin/${{ github.base_ref }} | grep VERSION; then
            echo "Version has not been changed. Bumping version..."

            # Configure git user using the last non-merge commit's author
            git config user.name "$(git log -1 --no-merges --pretty=format:'%an')"
            git config user.email "$(git log -1 --no-merges --pretty=format:'%ae')"

            # Bump patch version in VERSION file
            OLD_VERSION=$(cat VERSION)
            IFS='.' read -ra ADDR <<< "$OLD_VERSION"
            NEW_PATCH=$((ADDR[2] + 1))
            NEW_VERSION="${ADDR[0]}.${ADDR[1]}.$NEW_PATCH"
            echo "$NEW_VERSION" > VERSION

            DATE=$(date +%Y-%m-%d)

            # Get commits since base branch, format as "- Message"
            COMMITS=$(git log --no-merges --pretty=format:"- %s" origin/${{ github.base_ref }}..HEAD)

            echo "Generating changelog entry for version $NEW_VERSION..."

            # Create new entry content
            echo "## [$NEW_VERSION] - $DATE" > new_entry.md
            echo "### Changed" >> new_entry.md
            echo "$COMMITS" >> new_entry.md
            echo "" >> new_entry.md

            # Insert into CHANGELOG.md
            # We assume standard format: Header is first 4 lines (including blank line)
            head -n 4 CHANGELOG.md > temp_changelog.md
            cat new_entry.md >> temp_changelog.md
            tail -n +5 CHANGELOG.md >> temp_changelog.md

            mv temp_changelog.md CHANGELOG.md
            rm new_entry.md

            # Commit the change
            git add VERSION CHANGELOG.md
            git commit -m "Version bump to $NEW_VERSION and changelog update"

            # Push changes back to the PR branch
            git push origin HEAD:${{ github.head_ref }}
          else
            echo "Version has already been changed. Skipping bump."
          fi
