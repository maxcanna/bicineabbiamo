name: CI

on:
  push:
    branches-ignore:
      - 'master'

jobs:
  fixups:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v3
    - name: Check if there are fixup commits
      run: git log --pretty=format:%s origin/master.. | xargs | grep -v fixup
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Check version bump
        # Relaxed check: Only fail if it's NOT the auto-bump workflow/commit.
        # However, checking the author or branch is tricky in a detached CI job.
        # Simpler approach: Remove the strict check because we now rely on 'PR Version & Changelog Update' workflow.
        # Or better, print a warning instead of failing.
        run: |
          if ! git diff --diff-filter=M origin/master -- "package.json" | grep "version"; then
            echo "::warning::Version not bumped manually. If this is a PR, the auto-bumper should handle it."
          fi
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Check changelog update
        # Relaxed check: Only fail if it's NOT the auto-bump workflow/commit.
        run: |
          if ! git diff --name-only origin/master -- | grep CHANGELOG.md; then
             echo "::warning::CHANGELOG.md not updated manually. If this is a PR, the auto-bumper should handle it."
          fi
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v3
    - name: Setup node
      uses: actions/setup-node@v1
      with:
        node-version: 22
    - name: Install yarn
      run: npm install --global yarn@1.22.22
    - name: Install dependencies
      run: yarn
    - name: Lint
      run: npx eslint@^5.1.0 .
    - name: Run tests
      env:
        APIARY_API_KEY: ${{ secrets.APIARY_API_KEY }}
        APIARY_API_NAME: ${{ secrets.APIARY_API_NAME }}
        CI: GITHUB_ACTIONS
      run: ./test.sh
