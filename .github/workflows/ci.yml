name: CI

on:
  push:
    branches-ignore:
      - 'master'

jobs:
  fixups:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    - name: Check if there are fixup commits
      run: git log --pretty=format:%s origin/master.. | xargs | grep -v fixup
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Check version bump
        run: git diff --name-only origin/master | grep VERSION
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check changelog update
        run: git diff --name-only origin/master -- | grep CHANGELOG.md
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest
    - name: Run Gosec Security Scanner
      uses: securego/gosec@master
      with:
        args: ./...
    - name: Run go test
      run: go test -v ./...
